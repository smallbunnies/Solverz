name: Run tests in SolMuseum

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - '*'

jobs:
  tests_in_museum:

    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        os: [windows-2022]
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
    - name: Checkout Test Repository
      uses: actions/checkout@v6
      with:
        repository: 'smallbunnies/SolMuseum'
        ref: 'main'

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}

    - name: Install Main Repository as Dependency using Git URL
      run: |
        uv venv
        uv pip install git+https://github.com/${{github.repository}}.git@${{ github.sha }}
        uv pip install git+https://github.com/rzyu45/SolUtil@master
        uv pip install pytest pytest-xdist pytest-datadir
        uv pip install . --no-deps

    - name: Run Tests
      run: |
        .venv\Scripts\pytest -n auto
