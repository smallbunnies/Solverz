name: Run tests

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - '*'

jobs:
  built_in_tests:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v8.0.0
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}

    - name: Install the project
      run: |
        uv pip install -e .
        uv pip install git+https://github.com/smallbunnies/myfunc.git@main
    - run: | # run both independent pytest and doctest
        uv run pytest
